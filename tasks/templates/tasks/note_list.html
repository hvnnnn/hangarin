{% extends 'tasks/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">My Personal Notes</h2>
        <a href="{% url 'note_add' %}" class="btn btn-primary shadow-sm">+ New Note</a>
    </div>

    <div class="row">
        {% for note in notes %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm border-0 h-100" style="background-color: #f8fbff; border-left: 5px solid #007bff !important;">
                <div class="card-body">
                    <h5 class="card-title fw-bold text-dark">{{ note.title }}</h5>
                    <p class="card-text text-secondary small">{{ note.content|linebreaks }}</p>
                </div>
                <div class="card-footer bg-transparent border-0 d-flex justify-content-between">
                    <span class="text-muted x-small">{{ note.created_at|date:"M d" }}</span>
                    <a href="{% url 'note_delete' note.pk %}" class="text-danger small" onclick="return confirm('Delete this note?')">Delete</a>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center mt-5">
            <p class="text-muted">You don't have any notes yet. Write down your thoughts!</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
