{% extends 'tasks/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card border-0 shadow-lg" style="border-radius: 25px;">
            <div class="card-body p-5 text-center">
                <h2 class="fw-bold mb-2 text-primary"> Login</h2>
                <p class="text-muted small mb-4">Welcome back to Hangarin</p>
                
                <form method="post" class="text-start">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Username</label>
                        <input type="text" name="username" class="form-control rounded-pill border-light bg-light px-3" placeholder="Enter username">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Password</label>
                        <input type="password" name="password" class="form-control rounded-pill border-light bg-light px-3" placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-sm">LOG IN</button>
                </form>
                
                <div class="mt-4 pt-2 border-top">
                    <p class="small text-muted">New here? <a href="{% url 'signup' %}" class="text-primary fw-bold text-decoration-none">Create Account</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Styling for default Django inputs */
    input.form-control:focus {
        background-color: #fff;
        border-color: var(--sky-blue);
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
    }
</style>
{% endblock %}
